# Pre-commit hooks for Forcepoint Cloud DLP repositories
# Install: pip install pre-commit && pre-commit install
# This file ships with the company_workflow template.
# Copy it to target repos alongside CLAUDE.md and .claude/

repos:
  # ── Secrets Detection ──────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "Detect hardcoded secrets (gitleaks)"

  # ── General File Checks ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
        name: "Block large files (>500KB)"

      - id: check-merge-conflict
        name: "Check for merge conflict markers"

      - id: detect-private-key
        name: "Detect private keys"

      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]
        name: "Prevent direct commits to main/master"

      - id: check-json
        name: "Validate JSON files"

      - id: check-yaml
        name: "Validate YAML files"

      - id: end-of-file-fixer
        name: "Fix missing newline at end of files"

      - id: trailing-whitespace
        name: "Remove trailing whitespace"

  # -- Commit Message Format -------------------------------------------------
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        name: "Enforce Jira-prefixed commit messages"
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
        args: ['--config', 'commitlint.config.js']

  # -- Shell Script Linting ---------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: "Lint shell scripts (shellcheck)"

  # ── Terraform ──────────────────────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        name: "Terraform format check"

      - id: terraform_validate
        name: "Terraform validate"

      - id: terraform_trivy
        name: "Terraform security scan (trivy)"

  # ── Block .tfstate commits ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: branch-naming
        name: "Enforce branch naming convention"
        entry: bash -c 'BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null); if [ -z "$BRANCH" ]; then exit 0; fi; if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ] || [ "$BRANCH" = "develop" ]; then exit 0; fi; if ! echo "$BRANCH" | grep -qE "^(feature|bugfix|hotfix)/[A-Z]{2,}-[0-9]+-[a-z0-9-]+$"; then echo "BLOCKED: Branch name \"$BRANCH\" does not match pattern: feature/NEO-1234-short-description" >&2; exit 1; fi; exit 0'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: no-tfstate
        name: "Block .tfstate files"
        entry: bash -c 'echo "BLOCKED: .tfstate files must not be committed" >&2 && exit 1'
        language: system
        files: '\.tfstate'

      - id: no-env-files
        name: "Block .env and credential files"
        entry: bash -c 'echo "BLOCKED: Sensitive files must not be committed" >&2 && exit 1'
        language: system
        files: '\.(env|credentials|secret)$'

      - id: no-debug-logging
        name: "Warn on debug logging in production code"
        entry: bash -c 'FOUND=0; for f in "$@"; do case "$f" in *.java) if grep -nE "System\.out\.print" "$f"; then echo "BLOCKED: System.out in $f" >&2; FOUND=1; fi;; *.ts|*.tsx|*.js|*.jsx) if grep -nE "console\.(log|debug|info)" "$f" | grep -vE "(eslint-disable|\.test\.|\.spec\.)" | head -3; then echo "BLOCKED: console.log in $f" >&2; FOUND=1; fi;; *.py) if grep -nE "^\s*print\(" "$f" | grep -v "noqa" | head -3; then echo "BLOCKED: print() in $f" >&2; FOUND=1; fi;; esac; done; exit $FOUND'
        language: system
        types: [file]
        files: '\.(java|ts|tsx|js|jsx|py)$'

      - id: skipped-tests-need-tickets
        name: "Skipped tests must reference a ticket"
        entry: bash -c 'for f in "$@"; do if grep -nE "@Disabled|@Ignore|xdescribe|xit|xtest|test\.skip|it\.skip|describe\.skip|unittest\.skip|pytest\.mark\.skip" "$f" | grep -vE "[A-Z]{2,}-[0-9]+"; then echo "BLOCKED: Skipped test without ticket reference in $f" >&2; exit 1; fi; done; exit 0'
        language: system
        types: [file]
        files: '\.(java|ts|tsx|js|jsx|py)$'

  # -- Pre-Push Hooks (heavier checks) ----------------------------------------
  - repo: local
    hooks:
      - id: run-tests
        name: "Run tests before push"
        entry: bash -c 'if [ -f "package.json" ]; then npm test; elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then ./gradlew test; elif [ -f "pom.xml" ]; then ./mvnw test; elif [ -f "pytest.ini" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then pytest; else echo "No test runner detected — skipping"; fi'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-no-fixme
        name: "No FIXME/TODO without ticket in pushed code"
        entry: bash -c 'if git diff origin/HEAD...HEAD --name-only | xargs grep -nE "(TODO|FIXME|HACK|XXX)" 2>/dev/null | grep -vE "[A-Z]{2,}-[0-9]+" | head -10; then echo "BLOCKED: TODO/FIXME without ticket reference" >&2; exit 1; fi; exit 0'
        language: system
        pass_filenames: false
        stages: [pre-push]

  # ── Java (uncomment if repo uses Java) ─────────────────────────────
  # - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
