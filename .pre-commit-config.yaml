# Pre-commit hooks for Forcepoint Cloud DLP repositories
# Install: pip install pre-commit && pre-commit install
# This file ships with the company_workflow template.
# Copy it to target repos alongside CLAUDE.md and .claude/

repos:
  # ── Secrets Detection ──────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "Detect hardcoded secrets (gitleaks)"

  # ── General File Checks ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
        name: "Block large files (>500KB)"

      - id: check-merge-conflict
        name: "Check for merge conflict markers"

      - id: detect-private-key
        name: "Detect private keys"

      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]
        name: "Prevent direct commits to main/master"

      - id: check-json
        name: "Validate JSON files"

      - id: check-yaml
        name: "Validate YAML files"

      - id: end-of-file-fixer
        name: "Fix missing newline at end of files"

      - id: trailing-whitespace
        name: "Remove trailing whitespace"

  # ── Terraform ──────────────────────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        name: "Terraform format check"

      - id: terraform_validate
        name: "Terraform validate"

      - id: terraform_tfsec
        name: "Terraform security scan (tfsec)"

  # ── Block .tfstate commits ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: no-tfstate
        name: "Block .tfstate files"
        entry: bash -c 'echo "BLOCKED: .tfstate files must not be committed" >&2 && exit 1'
        language: system
        files: '\.tfstate'

      - id: no-env-files
        name: "Block .env and credential files"
        entry: bash -c 'echo "BLOCKED: Sensitive files must not be committed" >&2 && exit 1'
        language: system
        files: '\.(env|credentials|secret)$'

      - id: no-debug-logging
        name: "Warn on debug logging in production code"
        entry: bash -c 'for f in "$@"; do case "$f" in *.java) grep -nE "System\.out\.print" "$f" && echo "WARNING: System.out in $f" >&2;; *.ts|*.tsx|*.js|*.jsx) grep -nE "console\.(log|debug)" "$f" | grep -vE "(eslint-disable|test|spec)" && echo "WARNING: console.log in $f" >&2;; *.py) grep -nE "^\s*print\(" "$f" | grep -v "noqa" && echo "WARNING: print() in $f" >&2;; esac; done; exit 0'
        language: system
        types: [file]
        files: '\.(java|ts|tsx|js|jsx|py)$'

      - id: skipped-tests-need-tickets
        name: "Skipped tests must reference a ticket"
        entry: bash -c 'for f in "$@"; do if grep -nE "@Disabled|@Ignore|xdescribe|xit|test\.skip|pytest\.mark\.skip" "$f" | grep -vE "[A-Z]{2,}-[0-9]+"; then echo "BLOCKED: Skipped test without ticket reference in $f" >&2; exit 1; fi; done; exit 0'
        language: system
        types: [file]
        files: '\.(java|ts|tsx|js|jsx|py)$'

  # ── Java (uncomment if repo uses Java) ─────────────────────────────
